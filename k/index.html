<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Kiosko | FFT México</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --indicator-size: 10px;
      --indicator-active: #ffffff;
      --indicator-inactive: rgba(255, 255, 255, 0.45);
      --zone-hint: rgba(255, 255, 255, 0.08);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* Contenedor centrado que conserva 9:16 en cualquier orientación */
    .kiosk-viewport {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
    }

    .kiosk-frame {
      position: relative;
      aspect-ratio: 9 / 16;
      width: min(100vw, calc(100vh * 9 / 16));
      height: auto;
      max-height: 100vh;
      background: #111;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
    }

    #kioskCarousel {
      position: absolute;
      inset: 0;
    }

    .carousel-inner,
    .carousel-item {
      height: 100%;
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #111;
      pointer-events: none;
    }

    /* Zonas táctiles laterales */
    .nav-zone {
      position: absolute;
      top: 0;
      bottom: 72px;
      width: 28%;
      z-index: 10;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      transition: background 0.2s ease;
    }

    .nav-zone:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.6);
      outline-offset: -4px;
    }

    .nav-zone--left {
      left: 0;
    }

    .nav-zone--right {
      right: 0;
    }

    .nav-zone:active {
      background: var(--zone-hint);
    }

    /* Indicadores inferiores */
    .slide-indicators {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 20px 16px 28px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.55) 0%, transparent 100%);
    }

    .slide-indicators button {
      width: var(--indicator-size);
      height: var(--indicator-size);
      border: none;
      border-radius: 50%;
      padding: 0;
      background: var(--indicator-inactive);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .slide-indicators button.active {
      background: var(--indicator-active);
      transform: scale(1.25);
    }

    .slide-indicators button:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }

    /* Contador discreto */
    .slide-counter {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 20;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.75);
      background: rgba(0, 0, 0, 0.35);
      padding: 4px 10px;
      border-radius: 999px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="kiosk-viewport">
    <div class="kiosk-frame" id="kioskFrame">
      <div id="kioskCarousel" class="carousel slide h-100" data-bs-interval="false" data-bs-touch="false">
        <div class="carousel-inner h-100">
          <div class="carousel-item active h-100">
            <img src="assets/img/Slide1.PNG" alt="Diapositiva 1">
          </div>
          <div class="carousel-item h-100">
            <img src="assets/img/Slide2.PNG" alt="Diapositiva 2">
          </div>
          <div class="carousel-item h-100">
            <img src="assets/img/Slide3.PNG" alt="Diapositiva 3">
          </div>
          <div class="carousel-item h-100">
            <img src="assets/img/Slide4.PNG" alt="Diapositiva 4">
          </div>
          <div class="carousel-item h-100">
            <img src="assets/img/Slide5.PNG" alt="Diapositiva 5">
          </div>
          <div class="carousel-item h-100">
            <img src="assets/img/Slide6.PNG" alt="Diapositiva 6">
          </div>
          <div class="carousel-item h-100">
            <img src="assets/img/Slide7.PNG" alt="Diapositiva 7">
          </div>
          <div class="carousel-item h-100">
            <img src="assets/img/Slide8.PNG" alt="Diapositiva 8">
          </div>
          <div class="carousel-item h-100">
            <img src="assets/img/Slide9.PNG" alt="Diapositiva 9">
          </div>
          <div class="carousel-item h-100">
            <img src="assets/img/Slide10.PNG" alt="Diapositiva 10">
          </div>
        </div>
      </div>

      <button type="button" class="nav-zone nav-zone--left" id="btnPrev" aria-label="Diapositiva anterior"></button>
      <button type="button" class="nav-zone nav-zone--right" id="btnNext" aria-label="Diapositiva siguiente"></button>

      <div class="slide-indicators" id="slideIndicators" role="tablist" aria-label="Indicadores de diapositivas"></div>

      <div class="slide-counter" id="slideCounter" aria-hidden="true">1 / 10</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function () {
      const carouselEl = document.getElementById('kioskCarousel');
      const indicatorsEl = document.getElementById('slideIndicators');
      const counterEl = document.getElementById('slideCounter');
      const items = carouselEl.querySelectorAll('.carousel-item');
      const total = items.length;

      const carousel = new bootstrap.Carousel(carouselEl, {
        interval: false,
        ride: false,
        touch: false,
        wrap: true
      });

      function getActiveIndex() {
        return [...items].findIndex((item) => item.classList.contains('active'));
      }

      function updateUI() {
        const index = getActiveIndex();
        counterEl.textContent = (index + 1) + ' / ' + total;
        indicatorsEl.querySelectorAll('button').forEach((btn, i) => {
          btn.classList.toggle('active', i === index);
          btn.setAttribute('aria-selected', i === index ? 'true' : 'false');
        });
      }

      items.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-label', 'Ir a diapositiva ' + (i + 1));
        btn.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
        if (i === 0) btn.classList.add('active');
        btn.addEventListener('click', () => carousel.to(i));
        indicatorsEl.appendChild(btn);
      });

      document.getElementById('btnPrev').addEventListener('click', () => carousel.prev());
      document.getElementById('btnNext').addEventListener('click', () => carousel.next());

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          carousel.prev();
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          carousel.next();
        }
      });

      let touchStartX = 0;
      let touchStartY = 0;
      const swipeThreshold = 50;

      carouselEl.addEventListener('touchstart', (e) => {
        const touch = e.changedTouches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }, { passive: true });

      carouselEl.addEventListener('touchend', (e) => {
        const touch = e.changedTouches[0];
        const deltaX = touch.clientX - touchStartX;
        const deltaY = touch.clientY - touchStartY;

        if (Math.abs(deltaX) < swipeThreshold || Math.abs(deltaX) < Math.abs(deltaY)) return;

        if (deltaX < 0) {
          carousel.next();
        } else {
          carousel.prev();
        }
      }, { passive: true });

      carouselEl.addEventListener('slid.bs.carousel', updateUI);
      updateUI();
    })();
  </script>
</body>
</html>
